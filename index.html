<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task OS — 업무 관리 시스템</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    #pin-screen {
      position: fixed;
      inset: 0;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
    }
    #pin-screen.hidden { display: none; }
    .pin-box {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px 36px;
      width: 320px;
      max-width: 90vw;
      text-align: center;
    }
    .pin-logo { font-size: 32px; margin-bottom: 8px; }
    .pin-title { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .pin-subtitle { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 28px; }
    .pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.2);
      transition: all 0.15s;
    }
    .pin-dot.filled { background: #4f46e5; border-color: #4f46e5; }
    .pin-dot.error  { background: #ef4444; border-color: #ef4444; }
    .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .pin-key {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #fff;
      font-size: 20px;
      font-weight: 500;
      padding: 16px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .pin-key:hover  { background: rgba(255,255,255,0.12); }
    .pin-key:active { background: rgba(79,70,229,0.4); }
    .pin-key.del    { font-size: 16px; color: rgba(255,255,255,0.5); }
    .pin-key.empty  { visibility: hidden; }
    .pin-error { margin-top: 16px; font-size: 13px; color: #ef4444; min-height: 20px; }
  </style>
</head>
<body>

  <!-- PIN 화면 -->
  <div id="pin-screen">
    <div class="pin-box">
      <div class="pin-logo">⚙</div>
      <div class="pin-title">Task OS</div>
      <div class="pin-subtitle">PIN을 입력하세요</div>
      <div class="pin-dots">
        <div class="pin-dot" id="dot-0"></div>
        <div class="pin-dot" id="dot-1"></div>
        <div class="pin-dot" id="dot-2"></div>
        <div class="pin-dot" id="dot-3"></div>
      </div>
      <div class="pin-keypad">
        <button class="pin-key" onclick="pinInput('1')">1</button>
        <button class="pin-key" onclick="pinInput('2')">2</button>
        <button class="pin-key" onclick="pinInput('3')">3</button>
        <button class="pin-key" onclick="pinInput('4')">4</button>
        <button class="pin-key" onclick="pinInput('5')">5</button>
        <button class="pin-key" onclick="pinInput('6')">6</button>
        <button class="pin-key" onclick="pinInput('7')">7</button>
        <button class="pin-key" onclick="pinInput('8')">8</button>
        <button class="pin-key" onclick="pinInput('9')">9</button>
        <button class="pin-key empty"></button>
        <button class="pin-key" onclick="pinInput('0')">0</button>
        <button class="pin-key del" onclick="pinDelete()">⌫</button>
      </div>
      <div class="pin-error" id="pin-error"></div>
    </div>
  </div>

  <!-- 앱 본체 -->
  <div id="app" style="display:none;">

    <!-- 사이드바 (데스크탑) -->
    <aside id="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">⚙</span>
        <span class="logo-text">Task OS</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item" data-view="dashboard"><span class="nav-icon">🏠</span><span class="nav-label">대시보드</span></a>
        <a href="#" class="nav-item" data-view="inbox"><span class="nav-icon">📥</span><span class="nav-label">수신함</span><span class="nav-badge" id="badge-inbox"></span></a>
        <a href="#" class="nav-item" data-view="clarify"><span class="nav-icon">🔍</span><span class="nav-label">검토</span><span class="nav-badge" id="badge-clarify"></span></a>
        <a href="#" class="nav-item" data-view="plan"><span class="nav-icon">📅</span><span class="nav-label">계획</span></a>
        <a href="#" class="nav-item" data-view="today"><span class="nav-icon">▶</span><span class="nav-label">오늘 할 일</span><span class="nav-badge nav-badge--accent" id="badge-today"></span></a>
        <a href="#" class="nav-item" data-view="waiting"><span class="nav-icon">⏳</span><span class="nav-label">대기 중</span><span class="nav-badge nav-badge--warning" id="badge-waiting"></span></a>
        <a href="#" class="nav-item" data-view="done"><span class="nav-icon">✅</span><span class="nav-label">완료</span></a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-ghost btn-sm" id="btn-seed">🌱 샘플 데이터</button>
        <button class="btn-ghost btn-sm" id="btn-clear">🗑 초기화</button>
      </div>
    </aside>

    <!-- 메인 -->
    <main id="main-content">
      <div id="view-container"></div>
    </main>

    <!-- 모바일 하단 탭바 -->
    <nav class="mobile-tabbar">
      <div class="mobile-tabbar__inner">
        <button class="mobile-tab active" data-view="dashboard">
          <span class="mobile-tab__icon">🏠</span>
          <span>홈</span>
        </button>
        <button class="mobile-tab" data-view="today">
          <span class="mobile-tab__icon">▶</span>
          <span>오늘</span>
          <span class="mobile-tab__badge" id="m-badge-today"></span>
        </button>
        <button class="mobile-tab" data-view="inbox">
          <span class="mobile-tab__icon">📥</span>
          <span>수신함</span>
          <span class="mobile-tab__badge" id="m-badge-inbox"></span>
        </button>
        <button class="mobile-tab" data-view="waiting">
          <span class="mobile-tab__icon">⏳</span>
          <span>대기</span>
          <span class="mobile-tab__badge" id="m-badge-waiting"></span>
        </button>
        <button class="mobile-tab" data-view="__more__">
          <span class="mobile-tab__icon">☰</span>
          <span>더보기</span>
        </button>
      </div>
    </nav>

    <!-- 모바일 더보기 메뉴 -->
    <div class="mobile-more-menu" id="mobile-more-menu">
      <button class="mobile-more-item" data-view="clarify">🔍 검토</button>
      <button class="mobile-more-item" data-view="plan">📅 계획</button>
      <button class="mobile-more-item" data-view="done">✅ 완료</button>
      <button class="mobile-more-item" id="btn-seed">🌱 샘플 데이터</button>
      <button class="mobile-more-item" id="btn-clear-mobile">🗑 초기화</button>
    </div>

  </div>

  <!-- Task Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="task-modal">
      <div class="modal-header">
        <h2 id="modal-title">업무 상세</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <script>
    const CORRECT_PIN = '1234'; // ← 원하는 PIN으로 바꾸세요
    const SESSION_KEY = 'taskos_pin_ok';
    let pinValue = '';

    function pinInput(digit) {
      if (pinValue.length >= 4) return;
      pinValue += digit;
      updateDots();
      if (pinValue.length === 4) setTimeout(checkPin, 150);
    }
    function pinDelete() {
      pinValue = pinValue.slice(0, -1);
      updateDots();
      document.getElementById('pin-error').textContent = '';
    }
    function updateDots(state = 'normal') {
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById(`dot-${i}`);
        dot.classList.remove('filled', 'error');
        if (state === 'error') dot.classList.add('error');
        else if (i < pinValue.length) dot.classList.add('filled');
      }
    }
    function checkPin() {
      if (pinValue === CORRECT_PIN) {
        sessionStorage.setItem(SESSION_KEY, '1');
        document.getElementById('pin-screen').classList.add('hidden');
        document.getElementById('app').style.display = '';
      } else {
        updateDots('error');
        document.getElementById('pin-error').textContent = '잘못된 PIN입니다. 다시 입력해주세요.';
        setTimeout(() => { pinValue = ''; updateDots(); }, 800);
      }
    }
    document.addEventListener('keydown', (e) => {
      if (document.getElementById('pin-screen').classList.contains('hidden')) return;
      if (e.key >= '0' && e.key <= '9') pinInput(e.key);
      if (e.key === 'Backspace') pinDelete();
    });
    if (sessionStorage.getItem(SESSION_KEY) === '1') {
      document.getElementById('pin-screen').classList.add('hidden');
      document.getElementById('app').style.display = '';
    }
  </script>

  <script src="data.js"></script>
  <script src="views/task-modal.js"></script>
  <script src="views/dashboard.js"></script>
  <script src="views/inbox.js"></script>
  <script src="views/clarify.js"></script>
  <script src="views/plan.js"></script>
  <script src="views/today.js"></script>
  <script src="views/waiting.js"></script>
  <script src="views/done.js"></script>
  <script src="app.js"></script>

  <script>
    // 모바일 탭바 동작
    document.querySelectorAll('.mobile-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const view = tab.dataset.view;
        if (view === '__more__') {
          const menu = document.getElementById('mobile-more-menu');
          menu.classList.toggle('open');
          return;
        }
        document.getElementById('mobile-more-menu').classList.remove('open');
        document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        navigate(view);
      });
    });

    // 더보기 메뉴 항목
    document.querySelectorAll('.mobile-more-item[data-view]').forEach(item => {
      item.addEventListener('click', () => {
        document.getElementById('mobile-more-menu').classList.remove('open');
        navigate(item.dataset.view);
      });
    });

    // 모바일 초기화 버튼
    const btnClearMobile = document.getElementById('btn-clear-mobile');
    if (btnClearMobile) {
      btnClearMobile.addEventListener('click', () => {
        document.getElementById('mobile-more-menu').classList.remove('open');
        document.getElementById('btn-clear').click();
      });
    }

    // 모바일 배지 업데이트 (updateBadges 오버라이드)
    const _origUpdateBadges = typeof updateBadges === 'function' ? updateBadges : null;
    function updateMobileBadges() {
      const setB = (id, n) => {
        const el = document.getElementById(id);
        if (el) el.textContent = n > 0 ? n : '';
      };
      setB('m-badge-inbox',   getTasksByStatus('Inbox').length);
      setB('m-badge-today',   getTodayTasks().length);
      setB('m-badge-waiting', getWaitingTasks().length);
    }

    // 탭 클릭 시 모바일 배지도 갱신
    document.addEventListener('click', () => {
      if (typeof getTasksByStatus === 'function') updateMobileBadges();
    });
  </script>
</body>
</html>
